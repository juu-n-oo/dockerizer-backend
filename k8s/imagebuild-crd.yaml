apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: imagebuilds.dockerizer.aipub.ten1010.io
spec:
  scope: Namespaced
  names:
    plural: imagebuilds
    singular: imagebuild
    kind: ImageBuild
    shortNames:
      - imgbuild
      - ib
  group: dockerizer.aipub.ten1010.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: { }
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Target Image
          type: string
          jsonPath: .spec.targetImage
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - metadata
            - spec
          properties:
            metadata:
              type: object
            spec:
              type: object
              required:
                - dockerfileContent
                - targetImage
              properties:
                dockerfileContent:
                  type: string
                  description: Inline Dockerfile content to build
                targetImage:
                  type: string
                  description: "Full target image reference including tag (e.g. registry/project/image:tag)"
                pushSecretRef:
                  type: string
                  description: Name of the Secret containing registry push credentials
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Preparing
                    - Building
                    - Succeeded
                    - Failed
                  default: Pending
                startTime:
                  type: string
                  format: date-time
                completionTime:
                  type: string
                  format: date-time
                message:
                  type: string
                imageDigest:
                  type: string
                  description: Image digest on successful push (e.g. sha256:abc...)
