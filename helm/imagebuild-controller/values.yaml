replicaCount: 1

image:
  repository: ""  # ## HELM installer ##
  pullPolicy: Always
  tag: ""  # ## HELM installer ##

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations:
  ad.datadoghq.com/imagebuild-controller.logs: '[{"source": "java", "service": "imagebuild-controller"}]'
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes:
  - name: ca-certs
    secret:
      secretName: custom-ca-certs

volumeMounts:
  - mountPath: /certificates
    name: ca-certs
    readOnly: true

nodeSelector: {}

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists

envFrom:
  configMapSuffix: envs
  secretSuffix: envs

applicationYaml:
  spring:
    profiles:
      active: prod
  dockerizer:
    kubernetes:
      verifySsl: true
      kubeConfig:
        mode: IN_CLUSTER
    imagebuild:
      kanikoImage: ""  # ## HELM installer ## (e.g. registry.ten1010.io:8443/aipub/kaniko-executor:v1.24.0)
  logging:
    level:
      dockerizer: ""  # ## HELM installer ##
  management:
    server:
      port: &managementPort 8082
    endpoint:
      health:
        probes:
          enabled: true
    endpoints:
      web:
        exposure:
          include: health
    health:
      livenessstate:
        enabled: true
      readinessstate:
        enabled: true

agent:
  datadog: "false"
  javaToolOptions: "-javaagent:/opt/aipub/agents/dd-java-agent.jar"
  ddTraceAgentPort: "8126"
  ddService: "imagebuild-controller"
  ddEnv: "production"
  ddVersion: "1.0.0"
  host: "aipub-backend-datadog.aipub.svc.cluster.local"
  ddProfilingEnabled: "true"
  ddProfilingAllocationEnabled: "true"

service:
  type: ClusterIP
  ports:
    - name: management
      port: *managementPort
      protocol: TCP
      targetPort: *managementPort

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *managementPort
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *managementPort
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 3

# Install CRD with chart
installCrd: true
