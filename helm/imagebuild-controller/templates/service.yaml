apiVersion: v1
kind: Service
metadata:
  name: {{ include "imagebuild-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "imagebuild-controller.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "imagebuild-controller.selectorLabels" . | nindent 4 }}
  ports:
    {{- range .Values.service.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: {{ .protocol | default "TCP" }}
    {{- end }}
