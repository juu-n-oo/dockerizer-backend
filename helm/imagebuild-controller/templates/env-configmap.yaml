apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ .Values.envFrom.configMapSuffix }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "imagebuild-controller.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.applicationYaml.spring.profiles.active | quote }}
  DOCKERIZER_KUBERNETES_VERIFY_SSL: {{ .Values.applicationYaml.dockerizer.kubernetes.verifySsl | quote }}
  DOCKERIZER_KUBERNETES_KUBE_CONFIG_MODE: {{ .Values.applicationYaml.dockerizer.kubernetes.kubeConfig.mode | quote }}
  DOCKERIZER_IMAGEBUILD_KANIKO_IMAGE: {{ .Values.applicationYaml.dockerizer.imagebuild.kanikoImage | quote }}
  MANAGEMENT_SERVER_PORT: {{ .Values.applicationYaml.management.server.port | quote }}
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: {{ .Values.applicationYaml.management.endpoint.health.probes.enabled | quote }}
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: {{ .Values.applicationYaml.management.endpoints.web.exposure.include | quote }}
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: {{ .Values.applicationYaml.management.health.livenessstate.enabled | quote }}
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: {{ .Values.applicationYaml.management.health.readinessstate.enabled | quote }}
  {{- if .Values.applicationYaml.logging.level.dockerizer }}
  LOGGING_LEVEL_DOCKERIZER: {{ .Values.applicationYaml.logging.level.dockerizer | quote }}
  {{- end }}
  {{- if eq (.Values.agent.datadog | toString) "true" }}
  JAVA_TOOL_OPTIONS: {{ .Values.agent.javaToolOptions | quote }}
  DD_TRACE_AGENT_PORT: {{ .Values.agent.ddTraceAgentPort | quote }}
  DD_SERVICE: {{ .Values.agent.ddService | quote }}
  DD_ENV: {{ .Values.agent.ddEnv | quote }}
  DD_VERSION: {{ .Values.image.tag | quote }}
  DD_AGENT_HOST: {{ .Values.agent.host | quote }}
  DD_PROFILING_ENABLED: {{ .Values.agent.ddProfilingEnabled | quote }}
  DD_PROFILING_ALLOCATION_ENABLED: {{ .Values.agent.ddProfilingAllocationEnabled | quote }}
  {{- end }}
