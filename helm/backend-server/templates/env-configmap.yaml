apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ .Values.envFrom.configMapSuffix }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-server.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.applicationYaml.server.port | quote }}
  SPRING_PROFILES_ACTIVE: {{ .Values.applicationYaml.spring.profiles.active | quote }}
  SPRING_DATASOURCE_URL: {{ .Values.applicationYaml.spring.datasource.url | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.applicationYaml.spring.datasource.username | quote }}
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: {{ .Values.applicationYaml.spring.datasource.driverClassName | quote }}
  SPRING_JPA_HIBERNATE_DDL_AUTO: {{ .Values.applicationYaml.spring.jpa.ddlAuto | quote }}
  SPRING_JPA_SHOW_SQL: {{ .Values.applicationYaml.spring.jpa.showSql | quote }}
  DOCKERIZER_KUBERNETES_VERIFY_SSL: {{ .Values.applicationYaml.dockerizer.kubernetes.verifySsl | quote }}
  DOCKERIZER_KUBERNETES_KUBE_CONFIG_MODE: {{ .Values.applicationYaml.dockerizer.kubernetes.kubeConfig.mode | quote }}
  {{- range $i, $v := .Values.applicationYaml.dockerizer.dockerfile.forbiddenInstructions }}
  DOCKERIZER_DOCKERFILE_FORBIDDEN_INSTRUCTIONS_{{ $i }}: {{ $v | quote }}
  {{- end }}
  DOCKERIZER_VOLUME_CLIENT_MODE: {{ .Values.applicationYaml.dockerizer.volume.clientMode | quote }}
  DOCKERIZER_VOLUME_PROXY_BASE_URL: {{ .Values.applicationYaml.dockerizer.volume.proxyBaseUrl | quote }}
  DOCKERIZER_REGISTRY_NGC_ENABLED: {{ .Values.applicationYaml.dockerizer.registry.ngc.enabled | quote }}
  DOCKERIZER_REGISTRY_NGC_CATALOG_URL: {{ .Values.applicationYaml.dockerizer.registry.ngc.catalogUrl | quote }}
  DOCKERIZER_REGISTRY_NGC_REGISTRY_URL: {{ .Values.applicationYaml.dockerizer.registry.ngc.registryUrl | quote }}
  DOCKERIZER_REGISTRY_HUGGINGFACE_ENABLED: {{ .Values.applicationYaml.dockerizer.registry.huggingface.enabled | quote }}
  DOCKERIZER_REGISTRY_HUGGINGFACE_DOCKER_HUB_URL: {{ .Values.applicationYaml.dockerizer.registry.huggingface.dockerHubUrl | quote }}
  DOCKERIZER_REGISTRY_HUGGINGFACE_NAMESPACE: {{ .Values.applicationYaml.dockerizer.registry.huggingface.namespace | quote }}
  MANAGEMENT_SERVER_PORT: {{ .Values.applicationYaml.management.server.port | quote }}
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: {{ .Values.applicationYaml.management.endpoint.health.probes.enabled | quote }}
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: {{ .Values.applicationYaml.management.endpoints.web.exposure.include | quote }}
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: {{ .Values.applicationYaml.management.health.livenessstate.enabled | quote }}
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: {{ .Values.applicationYaml.management.health.readinessstate.enabled | quote }}
  {{- if .Values.applicationYaml.logging.level.dockerizer }}
  LOGGING_LEVEL_DOCKERIZER: {{ .Values.applicationYaml.logging.level.dockerizer | quote }}
  {{- end }}
  {{- if eq (.Values.agent.datadog | toString) "true" }}
  JAVA_TOOL_OPTIONS: {{ .Values.agent.javaToolOptions | quote }}
  DD_TRACE_AGENT_PORT: {{ .Values.agent.ddTraceAgentPort | quote }}
  DD_SERVICE: {{ .Values.agent.ddService | quote }}
  DD_ENV: {{ .Values.agent.ddEnv | quote }}
  DD_VERSION: {{ .Values.image.tag | quote }}
  DD_AGENT_HOST: {{ .Values.agent.host | quote }}
  DD_PROFILING_ENABLED: {{ .Values.agent.ddProfilingEnabled | quote }}
  DD_PROFILING_ALLOCATION_ENABLED: {{ .Values.agent.ddProfilingAllocationEnabled | quote }}
  {{- end }}
