apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-server.labels" . | nindent 4 }}
data:
  application.yaml: |
    spring:
      application:
        name: dockerizer-backend
      datasource:
        {{- if and .Values.postgresql.enabled (not .Values.config.datasource.url) }}
        url: "jdbc:postgresql://{{ include "backend-server.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
        {{- else }}
        url: {{ .Values.config.datasource.url | quote }}
        {{- end }}
        driver-class-name: {{ .Values.config.datasource.driverClassName }}
      jpa:
        hibernate:
          ddl-auto: {{ .Values.config.jpa.ddlAuto }}
        show-sql: {{ .Values.config.jpa.showSql }}
        properties:
          hibernate:
            format_sql: false
        open-in-view: false
      ai:
        mcp:
          server:
            name: dockerizer
            version: 1.0.0
            type: SYNC
            sse-message-endpoint: /mcp/messages

    server:
      port: 8080

    springdoc:
      api-docs:
        path: /api-docs
      swagger-ui:
        path: /swagger-ui

    dockerizer:
      kubernetes:
        verify-ssl: {{ .Values.config.dockerizer.kubernetes.verifySsl }}
        kube-config:
          mode: {{ .Values.config.dockerizer.kubernetes.kubeConfig.mode }}
      dockerfile:
        forbidden-instructions:
          {{- range .Values.config.dockerizer.dockerfile.forbiddenInstructions }}
          - {{ . }}
          {{- end }}
      volume:
        client-mode: {{ .Values.config.dockerizer.volume.clientMode }}
        {{- if .Values.config.dockerizer.volume.proxyBaseUrl }}
        proxy-base-url: {{ .Values.config.dockerizer.volume.proxyBaseUrl | quote }}
        {{- end }}
      registry:
        ngc:
          enabled: {{ .Values.config.dockerizer.registry.ngc.enabled }}
          catalog-url: {{ .Values.config.dockerizer.registry.ngc.catalogUrl }}
          registry-url: {{ .Values.config.dockerizer.registry.ngc.registryUrl }}
        huggingface:
          enabled: {{ .Values.config.dockerizer.registry.huggingface.enabled }}
          docker-hub-url: {{ .Values.config.dockerizer.registry.huggingface.dockerHubUrl }}
          namespace: {{ .Values.config.dockerizer.registry.huggingface.namespace }}
