apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-{{ .Values.envFrom.secretSuffix }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-server.labels" . | nindent 4 }}
stringData:
  SPRING_DATASOURCE_PASSWORD: {{ .Values.applicationYaml.spring.datasource.password | quote }}
  {{- if .Values.applicationYaml.dockerizer.registry.ngc.apiKey }}
  DOCKERIZER_REGISTRY_NGC_API_KEY: {{ .Values.applicationYaml.dockerizer.registry.ngc.apiKey | quote }}
  {{- end }}
