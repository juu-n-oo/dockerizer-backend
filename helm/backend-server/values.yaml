replicaCount: 1

image:
  repository: dockerizer-backend  # Required: e.g. harbor.example.com/brewery/backend-server
  tag: 0.0.1         # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: aipub-brewery.cluster7.idc1.ten1010.io
  frontend:
    serviceName: dockerizer-web
    servicePort: 80
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

# PostgreSQL database (deployed as StatefulSet)
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    database: dockerizer
    username: aipub
    password: ""  # Required: set via --set or values override
  persistence:
    storageClassName: local
    size: 8Gi
    localPath: /home/pjw/data  # Path on the node
    nodeName: "vnode2.pnode13.idc1.ten1010.io"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Spring Boot application configuration
config:
  # Database - auto-configured when postgresql.enabled=true
  datasource:
    url: "jdbc:postgresql://keycloak-postgresql.aipub.svc.cluster.local:5432/aipub"
    username: "aipub"
    password: ""
    driverClassName: org.postgresql.Driver
  jpa:
    ddlAuto: validate
    showSql: false
  # Dockerizer-specific
  dockerizer:
    kubernetes:
      verifySsl: true
      kubeConfig:
        mode: IN_CLUSTER
    dockerfile:
      forbiddenInstructions:
        - ADD
    volume:
      clientMode: K8S
      proxyBaseUrl: ""
    registry:
      ngc:
        enabled: false
        catalogUrl: https://api.ngc.nvidia.com/v2
        registryUrl: https://nvcr.io
        apiKey: ""
      huggingface:
        enabled: false
        dockerHubUrl: https://hub.docker.com/v2
        namespace: huggingface

# Existing secret containing datasource credentials (optional)
# If set, datasource.username/password in config are ignored
existingSecret: ""
# Keys in the existing secret
existingSecretKeys:
  datasourceUrl: spring.datasource.url
  datasourceUsername: spring.datasource.username
  datasourcePassword: spring.datasource.password

# NGC API Key from existing secret (optional)
ngcApiKeySecret: ""
ngcApiKeySecretKey: api-key
