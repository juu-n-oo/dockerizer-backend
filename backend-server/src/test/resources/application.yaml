spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

dockerizer:
  kubernetes:
    verify-ssl: false
    kube-config:
      mode: FILE
      kube-config-path: ${HOME}/.kube/config
  dockerfile:
    forbidden-instructions:
      - COPY
      - ADD
