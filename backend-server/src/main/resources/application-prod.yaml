spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dockerizer}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:brewery}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

dockerizer:
  kubernetes:
    verify-ssl: true
    kube-config:
      mode: IN_CLUSTER

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8082}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
